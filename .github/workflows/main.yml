name: CI
on: [push]

jobs:
  build:
    name: Build, lint, and test on Node ${{ matrix.node }} and ${{ matrix.os }}

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: ['24']
        os: [ubuntu-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
  
      - name: Test
        run: npm run test

      - name: Size
        run: npm run size
